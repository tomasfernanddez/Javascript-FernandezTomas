<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario con Validaciones</title>
    <style>
        /* Reset CSS - Elimina márgenes y paddings por defecto del navegador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Incluye padding y border en el tamaño total */
        }

        /* Estilos del body - Contenedor principal de la página */
        body {
            font-family: Arial, sans-serif;
            /* Gradiente de fondo que va de azul a morado */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; /* Altura mínima del 100% de la ventana */
            padding: 20px; /* Espaciado interno */
        }

        /* Contenedor principal del formulario */
        .container {
            max-width: 800px; /* Ancho máximo */
            margin: 0 auto; /* Centrado horizontal */
            background: white; /* Fondo blanco */
            border-radius: 15px; /* Bordes redondeados */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); /* Sombra suave */
            overflow: hidden; /* Oculta contenido que se desborde */
        }

        /* Header con el título dinámico */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
        }

        /* Estilos del título que cambia dinámicamente */
        .title {
            color: white;
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3); /* Sombra del texto */
            transition: all 0.3s ease; /* Transición suave para cambios */
        }

        /* Contenedor del formulario */
        .form-container {
            padding: 40px; /* Espaciado interno */
        }

        /* Grid del formulario - Por defecto una columna */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr; /* Una columna que ocupa todo el espacio */
            gap: 25px; /* Espacio entre elementos */
        }

        /* Media query para pantallas grandes (768px o más) */
        @media (min-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr 1fr; /* Dos columnas iguales */
                gap: 30px;
            }
        }

        /* Contenedor de cada campo del formulario */
        .field-group {
            display: flex;
            flex-direction: column; /* Elementos en columna (label arriba, input abajo) */
        }

        /* Estilos de las etiquetas (labels) */
        label {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* Estilos de los campos de entrada (inputs) */
        input {
            padding: 12px 15px;
            border: 2px solid #e1e5e9; /* Borde gris claro */
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease; /* Transición suave para efectos hover/focus */
            background: #f8f9fa; /* Fondo gris muy claro */
        }

        /* Estilos cuando el input tiene foco (está seleccionado) */
        input:focus {
            outline: none; /* Elimina el outline por defecto del navegador */
            border-color: #667eea; /* Cambia el color del borde */
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); /* Sombra azul suave */
        }

        /* Estilos para inputs con error */
        input.error {
            border-color: #e74c3c; /* Borde rojo */
            background: #fdf2f2; /* Fondo rojizo muy claro */
        }

        /* Contenedor de mensajes de error */
        .error-message {
            color: #e74c3c; /* Texto rojo */
            font-size: 13px;
            margin-top: 5px;
            opacity: 0; /* Inicialmente invisible */
            transform: translateY(-10px); /* Desplazado hacia arriba */
            transition: all 0.3s ease; /* Transición suave para aparecer */
        }

        /* Clase para mostrar mensajes de error con animación */
        .error-message.show {
            opacity: 1; /* Visible */
            transform: translateY(0); /* En su posición normal */
        }

        /* Contenedor del botón enviar */
        .submit-container {
            grid-column: 1 / -1; /* Ocupa todas las columnas del grid */
            display: flex;
            justify-content: center; /* Centra el botón */
            margin-top: 20px;
        }

        /* Estilos del botón enviar */
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px; /* Bordes muy redondeados */
            cursor: pointer; /* Cursor de mano al pasar por encima */
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); /* Sombra azul */
        }

        /* Efecto hover del botón */
        .submit-btn:hover {
            transform: translateY(-2px); /* Se eleva ligeramente */
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); /* Sombra más intensa */
        }

        /* Efecto al hacer clic en el botón */
        .submit-btn:active {
            transform: translateY(0); /* Vuelve a su posición original */
        }

        /* Estilos del modal (ventana emergente) */
        .modal {
            display: none; /* Inicialmente oculto */
            position: fixed; /* Posición fija respecto a la ventana */
            z-index: 1000; /* Aparece por encima de todo */
            left: 0;
            top: 0;
            width: 100%; /* Ocupa toda la pantalla */
            height: 100%;
            background-color: rgba(0,0,0,0.5); /* Fondo semi-transparente */
            backdrop-filter: blur(5px); /* Efecto de desenfoque del fondo */
        }

        /* Contenido del modal */
        .modal-content {
            background-color: white;
            margin: 5% auto; /* Centrado vertical y horizontal */
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh; /* Máximo 80% de la altura de la ventana */
            overflow-y: auto; /* Scroll vertical si es necesario */
            animation: modalSlideIn 0.3s ease; /* Animación de entrada */
        }

        /* Animación de entrada del modal */
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px); /* Aparece desde arriba */
            }
            to {
                opacity: 1;
                transform: translateY(0); /* Posición final */
            }
        }

        /* Header del modal */
        .modal-header {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Título del modal */
        .modal-title {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* Botón de cerrar (X) del modal */
        .close {
            color: #aaa;
            float: right; /* Alineado a la derecha */
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        /* Efecto hover del botón cerrar */
        .close:hover {
            color: #e74c3c; /* Se pone rojo al pasar el mouse */
        }

        /* Estilos para mostrar datos en el modal */
        .data-item {
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa; /* Fondo gris claro */
            border-radius: 8px;
        }

        /* Etiquetas de los datos en el modal */
        .data-label {
            font-weight: bold;
            color: #667eea; /* Color azul */
        }

        /* Lista de errores en el modal */
        .error-list {
            background: #fdf2f2; /* Fondo rojizo claro */
            border: 1px solid #e74c3c; /* Borde rojo */
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        /* Título de la lista de errores */
        .error-list h3 {
            color: #e74c3c;
            margin-bottom: 10px;
        }

        /* Lista de errores */
        .error-list ul {
            margin-left: 20px;
        }

        /* Elementos de la lista de errores */
        .error-list li {
            color: #e74c3c;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <!-- Contenedor principal de toda la aplicación -->
    <div class="container">
        <!-- Header con título dinámico -->
        <div class="header">
            <h1 class="title" id="dynamicTitle">HOLA</h1>
        </div>
        
        <!-- Contenedor del formulario -->
        <div class="form-container">
            <!-- Formulario principal -->
            <form id="mainForm">
                <!-- Grid que organiza los campos -->
                <div class="form-grid">
                    <!-- Campo Nombre Completo -->
                    <div class="field-group">
                        <label for="nombreCompleto">Nombre Completo</label>
                        <input type="text" id="nombreCompleto" name="nombreCompleto" placeholder="Ingresa tu nombre completo">
                        <!-- Div donde aparecerán los mensajes de error para este campo -->
                        <div class="error-message" id="error-nombreCompleto"></div>
                    </div>

                    <!-- Campo Email -->
                    <div class="field-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com">
                        <!-- Div donde aparecerán los mensajes de error para este campo -->
                        <div class="error-message" id="error-email"></div>
                    </div>

                    <!-- Contenedor del botón enviar (ocupa las dos columnas en desktop) -->
                    <div class="submit-container">
                        <button type="submit" class="submit-btn">Enviar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal (ventana emergente) - Inicialmente oculto -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <!-- Botón para cerrar el modal -->
                <span class="close">&times;</span>
                <!-- Título del modal (cambia según el contexto) -->
                <h2 class="modal-title" id="modalTitle">Información del Formulario</h2>
            </div>
            <!-- Contenido del modal (se genera dinámicamente con JavaScript) -->
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // OBJETO CON FUNCIONES DE VALIDACIÓN
        // Cada propiedad es el ID de un campo y su valor es una función que valida ese campo
        const validators = {
            // Validación para el campo nombre completo
            nombreCompleto: (value) => {
                // Verificar que tenga más de 6 caracteres
                if (value.length <= 6) {
                    return "El nombre debe tener más de 6 caracteres";
                }
                // Verificar que tenga al menos un espacio (para separar nombre y apellido)
                if (!value.includes(' ')) {
                    return "El nombre debe tener al menos un espacio";
                }
                // Separar por espacios y verificar que realmente haya nombre y apellido
                const words = value.trim().split(' ');
                if (words.length < 2 || words.some(word => word.length === 0)) {
                    return "Debe incluir nombre y apellido separados por espacio";
                }
                // Si llegamos aquí, no hay errores
                return null;
            },

            // Validación para el campo email
            email: (value) => {
                // Expresión regular para validar formato de email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(value)) {
                    return "Ingresa un email válido";
                }
                return null; // Sin errores
            }
        };

        // FUNCIÓN PARA MOSTRAR MENSAJES DE ERROR
        // Recibe el ID del campo y el mensaje de error a mostrar
        function showError(fieldId, message) {
            const field = document.getElementById(fieldId); // Obtener el input
            const errorDiv = document.getElementById(`error-${fieldId}`); // Obtener el div del mensaje
            
            field.classList.add('error'); // Agregar clase CSS para estilo de error
            errorDiv.textContent = message; // Establecer el texto del error
            errorDiv.classList.add('show'); // Agregar clase para mostrar con animación
        }

        // FUNCIÓN PARA LIMPIAR MENSAJES DE ERROR
        // Recibe el ID del campo del cual limpiar el error
        function clearError(fieldId) {
            const field = document.getElementById(fieldId);
            const errorDiv = document.getElementById(`error-${fieldId}`);
            
            field.classList.remove('error'); // Quitar clase de error del input
            errorDiv.textContent = ''; // Limpiar texto del mensaje
            errorDiv.classList.remove('show'); // Ocultar mensaje con animación
        }

        // FUNCIÓN PRINCIPAL DE VALIDACIÓN
        // Valida un campo específico y muestra/oculta errores según corresponda
        function validateField(fieldId) {
            const field = document.getElementById(fieldId);
            const value = field.value.trim(); // Obtener valor sin espacios al inicio/final
            
            // Verificar si el campo está vacío
            if (!value) {
                showError(fieldId, 'Este campo es obligatorio');
                return false; // Validación falló
            }

            // Buscar la función de validación específica para este campo
            const validator = validators[fieldId];
            if (validator) {
                const error = validator(value); // Ejecutar validación
                if (error) {
                    showError(fieldId, error); // Mostrar error si existe
                    return false;
                } else {
                    clearError(fieldId); // Limpiar error si validación pasó
                    return true;
                }
            }
            return true; // Si no hay validador específico, considerar válido
        }

        // ARRAY CON LOS IDs DE TODOS LOS CAMPOS A VALIDAR
        const fields = ['nombreCompleto', 'email'];
        
        // CONFIGURAR EVENT LISTENERS PARA CADA CAMPO
        fields.forEach(fieldId => {
            const field = document.getElementById(fieldId);
            
            // Evento 'blur': se ejecuta cuando el usuario sale del campo (pierde el foco)
            field.addEventListener('blur', () => {
                validateField(fieldId); // Validar cuando el usuario termine de editar
            });
            
            // Evento 'focus': se ejecuta cuando el usuario entra al campo (obtiene el foco)
            field.addEventListener('focus', () => {
                clearError(fieldId); // Limpiar error para que el usuario pueda corregir
            });
        });

        // FUNCIONALIDAD BONUS: TÍTULO DINÁMICO
        const nombreField = document.getElementById('nombreCompleto');
        const titleElement = document.getElementById('dynamicTitle');

        // Función que actualiza el título basándose en el nombre ingresado
        function updateTitle() {
            const nombre = nombreField.value.trim();
            if (nombre) {
                // Si hay texto, mostrar "HOLA [NOMBRE]" en mayúsculas
                titleElement.textContent = `HOLA ${nombre.toUpperCase()}`;
            } else {
                // Si no hay texto, mostrar solo "HOLA"
                titleElement.textContent = 'HOLA';
            }
        }

        // Agregar event listeners para actualizar el título en tiempo real
        nombreField.addEventListener('keydown', updateTitle); // Al presionar teclas
        nombreField.addEventListener('focus', updateTitle);   // Al enfocar el campo
        nombreField.addEventListener('input', updateTitle);   // Al cambiar el contenido

        // CONFIGURACIÓN DEL MODAL (VENTANA EMERGENTE)
        const modal = document.getElementById('modal');
        const closeBtn = document.getElementsByClassName('close')[0];

        // Cerrar modal cuando se hace clic en la X
        closeBtn.onclick = function() {
            modal.style.display = 'none';
        }

        // Cerrar modal cuando se hace clic fuera de él
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // MANEJO DEL ENVÍO DEL FORMULARIO
        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevenir envío normal del formulario
            
            let hasErrors = false; // Flag para saber si hay errores
            const errors = []; // Array para recopilar errores
            
            // VALIDAR TODOS LOS CAMPOS
            fields.forEach(fieldId => {
                if (!validateField(fieldId)) {
                    hasErrors = true;
                    // Recopilar información del error para el modal
                    const field = document.getElementById(fieldId);
                    const label = field.previousElementSibling.textContent; // Obtener texto del label
                    const errorMsg = document.getElementById(`error-${fieldId}`).textContent;
                    errors.push(`${label}: ${errorMsg}`);
                }
            });

            // PREPARAR Y MOSTRAR EL MODAL
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            if (hasErrors) {
                // Si hay errores, mostrar lista de errores
                modalTitle.textContent = 'Errores en el Formulario';
                modalBody.innerHTML = `
                    <div class="error-list">
                        <h3>Por favor, corrige los siguientes errores:</h3>
                        <ul>
                            ${errors.map(error => `<li>${error}</li>`).join('')}
                        </ul>
                    </div>
                `;
            } else {
                // Si no hay errores, mostrar datos del formulario
                modalTitle.textContent = 'Formulario Enviado Correctamente';
                const formData = new FormData(this); // Obtener datos del formulario
                let dataHtml = '';
                
                // Generar HTML para mostrar cada campo y su valor
                for (let [key, value] of formData.entries()) {
                    const label = document.querySelector(`label[for="${key}"]`).textContent;
                    dataHtml += `
                        <div class="data-item">
                            <div class="data-label">${label}:</div>
                            <div>${value}</div>
                        </div>
                    `;
                }
                
                modalBody.innerHTML = dataHtml;
            }
            
            // Mostrar el modal
            modal.style.display = 'block';
        });
    </script>
</body>
</html>
